<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="geometricPrecision">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComponentTransfer in="blur" result="faded">
        <feFuncA type="linear" slope="0.35" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="faded" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="28" fill="#111318" />
  <circle cx="32" cy="32" r="28" fill="none" stroke="#777777" stroke-width="2.5" filter="url(#glow)" />
  <g fill="#777777">
    <polygon points="29,16 35,16 32,10" />
    <rect x="28" y="16" width="8" height="18" />
    <rect x="25" y="34" width="14" height="3" rx="1" />
    <rect x="30" y="37" width="4" height="8" rx="1" />
  </g>
</svg>
